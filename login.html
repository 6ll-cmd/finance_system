<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 — 发票管家</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <style>
    body { display: grid; place-items: center; min-height: 100vh; }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: var(--space-3xl) var(--space-2xl);
      width: 380px; max-width: 90vw;
      box-shadow: var(--shadow-lg);
    }
    .login-card .logo { text-align: center; margin-bottom: var(--space-xl); }
    .login-card .logo h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .login-card .logo p { font-size: 0.8125rem; color: var(--muted); }
    .login-card .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: var(--space-xl); }
    .login-card .tab {
      flex: 1; padding: 10px 0; text-align: center; cursor: pointer;
      font-size: 0.875rem; font-weight: 510; color: var(--muted);
      border-bottom: 2px solid transparent; transition: all var(--duration) var(--ease);
    }
    .login-card .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: var(--space-md); }
    .form-group label { font-size: 0.8125rem; font-weight: 510; }
    .form-group .hint { font-size: 0.75rem; color: var(--muted); }
    .error-msg { color: var(--danger); font-size: 0.8125rem; text-align: center; margin-top: var(--space-sm); display: none; }
    .error-msg.show { display: block; }
    .btn-full { width: 100%; padding: 12px; font-size: 1rem; }
    .btn-full:disabled { opacity: 0.6; cursor: not-allowed; }
    .footer-text { text-align: center; font-size: 0.75rem; color: var(--muted); margin-top: var(--space-lg); }
  </style>
</head>
<body>
  <div class="login-card animate-in">
    <div class="logo">
      <h1>发票管家</h1>
      <p>广州共生纪元云科技有限公司</p>
    </div>

    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">登录</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">注册</div>
    </div>

    <!-- 登录表单 -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="login-user">用户名</label>
        <input type="text" class="input" id="login-user" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="login-pass">密码</label>
        <input type="password" class="input" id="login-pass" required autocomplete="current-password" />
      </div>
      <div class="error-msg" id="login-error"></div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:var(--space-md);">登 录</button>
      <p class="footer-text">广州共生纪元云科技有限公司</p>
    </form>

    <!-- 注册表单（默认隐藏） -->
    <form id="register-form" onsubmit="handleRegister(event)" style="display:none;">
      <div class="form-group">
        <label for="reg-user">用户名</label>
        <input type="text" class="input" id="reg-user" required minlength="2" autocomplete="username" />
        <span class="hint">至少 2 个字符</span>
      </div>
      <div class="form-group">
        <label for="reg-pass">密码</label>
        <input type="password" class="input" id="reg-pass" required minlength="8" autocomplete="new-password" />
        <span class="hint">至少 8 位，含字母和数字</span>
      </div>
      <div class="error-msg" id="reg-error"></div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:var(--space-md);">注 册</button>
      <p class="footer-text">注册后自动登录，数据完全隔离</p>
    </form>
  </div>

  <script>
    var mode = 'login';

    function switchTab(tab) {
      mode = tab;
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
      hideErrors();
    }

    function showError(id, msg) {
      var el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }
    function hideErrors() {
      document.getElementById('login-error').classList.remove('show');
      document.getElementById('reg-error').classList.remove('show');
    }

    function handleLogin(e) {
      e.preventDefault();
      hideErrors();
      var btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = '登录中…';
      var username = document.getElementById('login-user').value.trim();
      var password = document.getElementById('login-pass').value;
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      })
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
        .then(function(r) {
          if (!r.ok) { showError('login-error', r.data.error); btn.disabled = false; btn.textContent = '登 录'; return; }
          localStorage.setItem('token', r.data.token);
          localStorage.setItem('username', r.data.username);
          window.location.href = 'index.html';
        })
        .catch(function() { showError('login-error', '无法连接服务，请确认已启动 start.bat'); btn.disabled = false; btn.textContent = '登 录'; });
    }

    function handleRegister(e) {
      e.preventDefault();
      hideErrors();
      var btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = '注册中…';
      var username = document.getElementById('reg-user').value.trim();
      var password = document.getElementById('reg-pass').value;
      fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      })
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
        .then(function(r) {
          if (!r.ok) { showError('reg-error', r.data.error); btn.disabled = false; btn.textContent = '注 册'; return; }
          localStorage.setItem('token', r.data.token);
          localStorage.setItem('username', r.data.username);
          window.location.href = 'index.html';
        })
        .catch(function() { showError('reg-error', '无法连接服务，请确认已启动 start.bat'); btn.disabled = false; btn.textContent = '注 册'; });
    }

    // 如果已登录直接跳转
    if (localStorage.getItem('token')) {
      fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') } })
        .then(function(r) { if (r.ok) window.location.href = 'index.html'; })
        .catch(function() {});
    }
  </script>
</body>
</html>
