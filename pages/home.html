<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>发票管家</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <script src="../js/auth.js"></script>
  <style>
    html, body { height: 100%; overflow: hidden; margin:0; padding:0; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--fg); }
    .home-shell { max-width: 960px; margin: 0 auto; padding: var(--space-2xl) var(--space-lg); }
    h2 { font-family: var(--font-display); font-size: 1.375rem; font-weight: 600; letter-spacing: -0.01em; margin-bottom: var(--space-md); }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-md); margin-bottom: var(--space-xl); }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-lg); display: flex; flex-direction: column; gap: 4px; }
    .stat-card .sc-value { font-family: var(--font-mono); font-size: 1.625rem; font-weight: 600; letter-spacing: -0.01em; }
    .stat-card .sc-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .stat-card.accent { border-top: 3px solid var(--accent); }
    .stat-card.warn { border-top: 3px solid var(--warn); }
    .quick-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-md); margin-bottom: var(--space-xl); }
    .action-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-lg) var(--space-xl); text-decoration: none; color: var(--fg); display: flex; align-items: center; gap: var(--space-md); transition: all var(--duration) var(--ease); }
    .action-card:hover { box-shadow: var(--shadow-md); border-color: var(--accent); }
    .action-card .ac-icon { width: 44px; height: 44px; border-radius: var(--radius-md); background: var(--accent-light); color: var(--accent); display: grid; place-items: center; flex-shrink: 0; }
    .action-card .ac-text h3 { font-size: 0.9375rem; margin-bottom: 2px; }
    .action-card .ac-text p { font-size: 0.75rem; color: var(--muted); }
    .recent-list { display: flex; flex-direction: column; gap: 1px; background: var(--border-light); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); }
    .recent-item { display: flex; align-items: center; justify-content: space-between; padding: 14px var(--space-lg); background: var(--surface); gap: var(--space-md); text-decoration: none; color: inherit; transition: background var(--duration) var(--ease); }
    .recent-item:hover { background: var(--hover); }
    .recent-item .ri-amount { font-family: var(--font-mono); font-weight: 590; white-space: nowrap; }
    @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2, 1fr); } .quick-actions { grid-template-columns: 1fr; } .home-shell { padding: var(--space-lg) var(--space-md); } }
  </style>
</head>
<body>
  <div class="home-shell">
    <h2>首页概览</h2>
    <div class="stats-row">
      <div class="stat-card accent"><div class="sc-label">发票总数</div><div class="sc-value" id="stat-total">—</div><div class="text-xs text-muted" id="stat-total-amount">—</div></div>
      <div class="stat-card"><div class="sc-label">本月新增</div><div class="sc-value" id="stat-month">—</div><div class="text-xs text-muted" id="stat-month-amount">—</div></div>
      <div class="stat-card warn"><div class="sc-label">待报销</div><div class="sc-value" id="stat-pending">—</div><div class="text-xs text-muted" id="stat-pending-amount">—</div></div>
      <div class="stat-card"><div class="sc-label">已报销</div><div class="sc-value" id="stat-reimbursed">—</div><div class="text-xs text-muted" id="stat-rate">—</div></div>
    </div>
    <h2>快捷操作</h2>
    <div class="quick-actions">
      <a href="invoice-add.html" class="action-card"><div class="ac-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div><div class="ac-text"><h3>录入发票</h3><p>手动录入或 AI 拍照识别</p></div></a>
      <a href="voucher-add.html" class="action-card"><div class="ac-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div><div class="ac-text"><h3>新增凭证</h3><p>录入会计借贷分录</p></div></a>
      <a href="invoice-list.html?status=pending" class="action-card"><div class="ac-icon" style="background:var(--warn-bg);color:var(--warn);"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="6" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="ac-text"><h3>待报销</h3><p>查看待处理的发票</p></div></a>
      <a href="dashboard.html" class="action-card"><div class="ac-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg></div><div class="ac-text"><h3>数据看板</h3><p>发票统计与图表分析</p></div></a>
    </div>
    <h2>最近录入</h2>
    <div class="recent-list" id="recent-list">
      <div class="empty-state" style="padding:var(--space-2xl);"><p>暂无发票记录，点击上方"录入发票"开始使用</p></div>
    </div>
  </div>
  <script>
    function fmt(n) { return n.toLocaleString('zh-CN', {minimumFractionDigits:2}); }
    fetch('/api/stats').then(function(r){return r.json()}).then(function(s){
      document.getElementById('stat-total').textContent = s.totalInvoices;
      document.getElementById('stat-total-amount').textContent = '累计金额 ¥' + fmt(s.totalAmount);
      document.getElementById('stat-month').textContent = s.thisMonth;
      document.getElementById('stat-month-amount').textContent = '本月金额 ¥' + fmt(s.thisMonthAmount);
      document.getElementById('stat-pending').textContent = s.pendingReimburse;
      document.getElementById('stat-pending-amount').textContent = '待处理 ¥' + fmt(s.pendingAmount);
      document.getElementById('stat-reimbursed').textContent = s.reimbursed;
      var rate = s.totalInvoices > 0 ? (s.reimbursed / s.totalInvoices * 100).toFixed(1) + '%' : '—';
      document.getElementById('stat-rate').textContent = '报销率 ' + rate;
    }).catch(function(){});
    fetch('/api/invoices?limit=5&sort=date-desc').then(function(r){return r.json()}).then(function(result){
      if (!result.data.length) return;
      document.getElementById('recent-list').innerHTML = result.data.map(function(inv){
        var bc = {pending:'badge-warn',reimbursed:'badge-success',rejected:'badge-danger'}[inv.status]||'';
        var sn = {pending:'待报销',reimbursed:'已报销',rejected:'已退回'}[inv.status]||inv.status;
        return '<a href="invoice-detail.html?id='+inv.id+'" class="recent-item"><div style="display:flex;align-items:center;gap:var(--space-md);min-width:0;"><span class="badge '+bc+'">'+sn+'</span><span class="text-sm" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+inv.seller+'</span></div><div class="flex items-center gap-lg"><span class="ri-amount">¥'+fmt(inv.totalAmount)+'</span><span class="text-xs text-muted">'+inv.date.substring(5)+'</span></div></a>';
      }).join('');
    }).catch(function(){});
  </script>
</body>
</html>
