<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>凭证详情 — 发票管家</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <style>
    .app-shell {
      max-width: 860px; margin: 0 auto;
      padding: var(--space-lg) var(--space-lg) var(--space-3xl);
      display: flex; flex-direction: column; gap: var(--space-lg);
    }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: var(--space-md); border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: var(--space-md);
    }
    .top-bar .breadcrumb { display: flex; align-items: center; gap: var(--space-sm); font-size: 0.8125rem; color: var(--muted); }
    .top-bar .breadcrumb a { color: var(--accent-text); text-decoration: none; }
    .top-bar .breadcrumb a:hover { text-decoration: underline; }

    .detail-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .detail-header {
      padding: var(--space-xl); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: var(--space-md);
    }
    .detail-header .dh-id { font-family: var(--font-mono); font-size: 1.125rem; font-weight: 600; }
    .detail-body { padding: var(--space-xl); }

    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md) var(--space-xl);
    }
    .info-item { display: flex; flex-direction: column; gap: 2px; }
    .info-item .info-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .info-item .info-value { font-weight: 510; }

    /* 分录表格 */
    .entry-section { margin-top: var(--space-xl); }
    .entry-section h3 { margin-bottom: var(--space-md); }

    /* 汇总 */
    .total-bar {
      display: flex; justify-content: flex-end; gap: var(--space-xl);
      padding: var(--space-md) var(--space-lg); background: var(--bg);
      border-radius: var(--radius-md); border: 1px solid var(--border);
      margin-top: var(--space-md);
    }
    .total-bar .tb-item { text-align: right; }
    .total-bar .tb-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .total-bar .tb-value { font-family: var(--font-mono); font-size: 1.125rem; font-weight: 590; }

    .action-bar { display: flex; gap: var(--space-md); padding-top: var(--space-lg); border-top: 1px solid var(--border); margin-top: var(--space-lg); }

    @media (max-width: 768px) {
      .info-grid { grid-template-columns: 1fr; }
      .app-shell { padding: var(--space-md); gap: var(--space-md); }
    }
  </style>
</head>
<body>
  <div class="app-shell animate-in">

    <div class="top-bar">
      <div class="breadcrumb">
        <a href="../index.html">发票管家</a>
        <span style="color:var(--border);">›</span>
        <a href="voucher-list.html">凭证列表</a>
        <span style="color:var(--border);">›</span>
        <span>凭证详情</span>
      </div>
      <a href="voucher-list.html" class="btn btn-sm">← 返回列表</a>
    </div>

    <div class="detail-card" id="detail-card" data-od-id="voucher-detail">
      <div class="detail-header">
        <div>
          <div class="dh-id" id="detail-id">—</div>
          <div class="text-xs text-muted" style="margin-top:4px;" id="detail-date">—</div>
        </div>
        <span class="badge" id="detail-status-badge">—</span>
      </div>

      <div class="detail-body">
        <div class="info-grid">
          <div class="info-item" style="grid-column:1/-1;">
            <span class="info-label">摘要</span>
            <span class="info-value" id="detail-desc">—</span>
          </div>
          <div class="info-item" style="grid-column:1/-1;">
            <span class="info-label">备注</span>
            <span class="info-value" id="detail-notes">—</span>
          </div>
        </div>

        <!-- 分录明细 -->
        <div class="entry-section">
          <h3>借贷分录</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>会计科目</th><th style="text-align:right;">借方金额</th><th style="text-align:right;">贷方金额</th><th>摘要</th></tr>
              </thead>
              <tbody id="entry-body"></tbody>
            </table>
          </div>

          <div class="total-bar">
            <div class="tb-item">
              <div class="tb-label">借方合计</div>
              <div class="tb-value" id="total-debit">¥0.00</div>
            </div>
            <div class="tb-item">
              <div class="tb-label">贷方合计</div>
              <div class="tb-value" id="total-credit">¥0.00</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="action-bar" id="action-bar" data-od-id="detail-actions">
      <button class="btn btn-primary" id="btn-post" onclick="changeStatus('posted')">✓ 过账</button>
      <button class="btn" id="btn-cancel" onclick="changeStatus('cancelled')" style="color:var(--danger);border-color:var(--danger);">✗ 作废</button>
      <button class="btn" id="btn-draft" onclick="changeStatus('draft')">↻ 重置为草稿</button>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    var currentVoucher = null;
    var statusNames = { draft:'草稿', posted:'已过账', cancelled:'已作废' };
    var statusBadges = { draft:'badge-info', posted:'badge-success', cancelled:'badge-danger' };

    var params = new URLSearchParams(window.location.search);
    var voucherId = params.get('id');

    if (!voucherId) {
      document.getElementById('detail-card').innerHTML =
        '<div class="empty-state"><p>缺少凭证 ID</p><a href="voucher-list.html" class="btn btn-sm mt-md">返回列表</a></div>';
      document.getElementById('action-bar').style.display = 'none';
    } else {
      fetch('/api/vouchers/' + voucherId)
        .then(function(r) { if (!r.ok) throw new Error('Not found'); return r.json(); })
        .then(function(v) { currentVoucher = v; renderDetail(); })
        .catch(function() {
          document.getElementById('detail-card').innerHTML =
            '<div class="empty-state"><p>未找到该凭证</p><a href="voucher-list.html" class="btn btn-sm mt-md">返回列表</a></div>';
          document.getElementById('action-bar').style.display = 'none';
        });
    }

    function renderDetail() {
      var v = currentVoucher;
      document.getElementById('detail-id').textContent = v.id;
      document.getElementById('detail-date').textContent = '凭证日期：' + v.voucherDate;
      var badge = document.getElementById('detail-status-badge');
      badge.textContent = statusNames[v.status] || v.status;
      badge.className = 'badge ' + (statusBadges[v.status] || '');
      document.getElementById('detail-desc').textContent = v.description;
      document.getElementById('detail-notes').textContent = v.notes || '—';

      // 分录
      var totalDebit = 0, totalCredit = 0;
      var rows = (v.entries || []).map(function(e) {
        totalDebit += e.debit_amount; totalCredit += e.credit_amount;
        return '<tr>' +
          '<td style="font-weight:510;">' + e.account + '</td>' +
          '<td class="text-mono" style="text-align:right;">' + (e.debit_amount > 0 ? '¥' + e.debit_amount.toLocaleString('zh-CN',{minimumFractionDigits:2}) : '—') + '</td>' +
          '<td class="text-mono" style="text-align:right;">' + (e.credit_amount > 0 ? '¥' + e.credit_amount.toLocaleString('zh-CN',{minimumFractionDigits:2}) : '—') + '</td>' +
          '<td class="text-sm text-muted">' + (e.summary || '—') + '</td>' +
          '</tr>';
      }).join('');
      document.getElementById('entry-body').innerHTML = rows;

      document.getElementById('total-debit').textContent = '¥' + totalDebit.toLocaleString('zh-CN',{minimumFractionDigits:2});
      document.getElementById('total-credit').textContent = '¥' + totalCredit.toLocaleString('zh-CN',{minimumFractionDigits:2});

      // 按钮
      document.getElementById('btn-post').style.display = v.status === 'draft' ? '' : 'none';
      document.getElementById('btn-cancel').style.display = v.status !== 'cancelled' ? '' : 'none';
      document.getElementById('btn-draft').style.display = v.status !== 'draft' ? '' : 'none';
    }

    function changeStatus(newStatus) {
      if (!currentVoucher) return;
      fetch('/api/vouchers/' + currentVoucher.id + '/status', {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ status: newStatus })
      })
        .then(function(r) { return r.json(); })
        .then(function(v) {
          currentVoucher = v;
          renderDetail();
          var msgs = { posted: '已过账', cancelled: '已作废', draft: '已重置为草稿' };
          alert('凭证 ' + v.id + ' ' + (msgs[newStatus] || '状态已更新'));
        })
        .catch(function() { alert('操作失败'); });
    }
  </script>
</body>
</html>
