<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>发票详情 — 发票管家</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <style>
    .app-shell {
      max-width: 800px; margin: 0 auto;
      padding: var(--space-lg) var(--space-lg) var(--space-3xl);
      display: flex; flex-direction: column; gap: var(--space-lg);
    }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: var(--space-md); border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: var(--space-md);
    }
    .top-bar .breadcrumb { display: flex; align-items: center; gap: var(--space-sm); font-size: 0.8125rem; color: var(--muted); }
    .top-bar .breadcrumb a { color: var(--accent-text); text-decoration: none; }
    .top-bar .breadcrumb a:hover { text-decoration: underline; }

    .detail-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .detail-header {
      padding: var(--space-xl); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: var(--space-md);
    }
    .detail-header .dh-id { font-family: var(--font-mono); font-size: 1.125rem; font-weight: 600; }
    .detail-body { padding: var(--space-xl); }

    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md) var(--space-xl);
    }
    .info-item { display: flex; flex-direction: column; gap: 2px; }
    .info-item .info-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .info-item .info-value { font-weight: 510; }

    .amount-highlight {
      background: var(--bg); border-radius: var(--radius-md);
      padding: var(--space-lg); margin-top: var(--space-lg);
      display: flex; justify-content: space-between; align-items: center;
    }
    .amount-highlight .ah-label { font-size: 0.8125rem; color: var(--muted); }
    .amount-highlight .ah-value { font-family: var(--font-mono); font-size: 1.5rem; font-weight: 600; }

    .image-placeholder {
      width: 100%; height: 240px; background: var(--bg);
      border-radius: var(--radius-md); border: 1px dashed var(--border);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: var(--space-sm); color: var(--muted);
      margin-top: var(--space-md);
    }

    .action-bar {
      display: flex; gap: var(--space-md); padding-top: var(--space-lg);
      border-top: 1px solid var(--border); margin-top: var(--space-lg);
    }

    @media (max-width: 768px) {
      .info-grid { grid-template-columns: 1fr; }
      .app-shell { padding: var(--space-md); gap: var(--space-md); }
    }
  </style>
</head>
<body>
  <div class="app-shell animate-in">

    <!-- 顶栏 -->
    <div class="top-bar">
      <div class="breadcrumb">
        <a href="../index.html">发票管家</a>
        <span style="color:var(--border);">›</span>
        <a href="invoice-list.html">发票列表</a>
        <span style="color:var(--border);">›</span>
        <span>发票详情</span>
      </div>
      <div class="flex gap-sm">
        <a href="invoice-list.html" class="btn btn-sm">← 返回列表</a>
      </div>
    </div>

    <!-- 详情卡片 -->
    <div class="detail-card" id="detail-card" data-od-id="invoice-detail">
      <div class="detail-header">
        <div>
          <div class="dh-id" id="detail-id">—</div>
          <div class="text-xs text-muted" style="margin-top:4px;" id="detail-date">—</div>
        </div>
        <span class="badge" id="detail-status-badge">—</span>
      </div>

      <div class="detail-body">
        <div class="info-grid">
          <div class="info-item"><span class="info-label">发票类型</span><span class="info-value" id="detail-type">—</span></div>
          <div class="info-item"><span class="info-label">发票类别</span><span class="info-value" id="detail-category">—</span></div>
          <div class="info-item"><span class="info-label">发票代码</span><span class="info-value" id="detail-code">—</span></div>
          <div class="info-item"><span class="info-label">发票号码</span><span class="info-value" id="detail-number">—</span></div>
          <div class="info-item" style="grid-column:1/-1;"><span class="info-label">销售方</span><span class="info-value" id="detail-seller">—</span></div>
          <div class="info-item" style="grid-column:1/-1;"><span class="info-label">购买方</span><span class="info-value" id="detail-buyer">—</span></div>
          <div class="info-item" style="grid-column:1/-1;"><span class="info-label">备注</span><span class="info-value" id="detail-notes">—</span></div>
        </div>

        <!-- 金额明细 -->
        <div class="amount-highlight">
          <div>
            <div class="text-sm text-muted">不含税金额</div>
            <div style="font-family:var(--font-mono);font-weight:590;" id="detail-amount">—</div>
          </div>
          <div style="color:var(--muted);font-size:1.25rem;">+</div>
          <div>
            <div class="text-sm text-muted">税额 (<span id="detail-taxrate">—</span>)</div>
            <div style="font-family:var(--font-mono);font-weight:590;" id="detail-tax">—</div>
          </div>
          <div style="color:var(--muted);font-size:1.25rem;">=</div>
          <div>
            <div class="ah-label">含税总额</div>
            <div class="ah-value" id="detail-total">—</div>
          </div>
        </div>

        <!-- 发票图片 -->
        <div class="image-placeholder" id="detail-image-area">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
          </svg>
          <span class="text-sm">暂无发票图片</span>
        </div>
      </div>
    </div>

    <!-- 操作栏 -->
    <div class="action-bar" id="action-bar" data-od-id="detail-actions">
      <button class="btn btn-primary" id="btn-approve" onclick="changeStatus('reimbursed')">✓ 标记已报销</button>
      <button class="btn" id="btn-reject" onclick="changeStatus('rejected')" style="color:var(--danger);border-color:var(--danger);">✗ 退回发票</button>
      <button class="btn" id="btn-pending" onclick="changeStatus('pending')">↻ 重置为待报销</button>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    var currentInvoice = null;
    var catNames = {
      service:'技术服务', travel:'差旅交通', catering:'餐饮招待',
      office:'办公用品', utility:'水电物业', logistics:'物流快递',
      rental:'房租租赁', other:'其他'
    };
    var statusNames = { pending:'待报销', reimbursed:'已报销', rejected:'已退回' };
    var statusBadges = { pending:'badge-warn', reimbursed:'badge-success', rejected:'badge-danger' };
    var typeNames = {
      'vat-special': '增值税专用发票',
      'vat-normal': '增值税电子普通发票',
      'vat-elec': '增值税电子专用发票',
      'general': '普通发票'
    };

    // 加载数据
    var params = new URLSearchParams(window.location.search);
    var invoiceId = params.get('id');

    fetch('/api/invoices/' + invoiceId)
        .then(function(r) {
          if (!r.ok) throw new Error('Not found');
          return r.json();
        })
        .then(function(inv) {
          currentInvoice = inv;
          renderDetail();
        })
        .catch(function() {
          document.getElementById('detail-card').innerHTML =
            '<div class="empty-state"><p>未找到该发票记录</p><a href="invoice-list.html" class="btn btn-sm mt-md">返回列表</a></div>';
          document.getElementById('action-bar').style.display = 'none';
        });

    function renderDetail() {
      var inv = currentInvoice;
      document.getElementById('detail-id').textContent = inv.id;
      document.getElementById('detail-date').textContent = '开票日期：' + inv.date;
      var badge = document.getElementById('detail-status-badge');
      badge.textContent = statusNames[inv.status] || inv.status;
      badge.className = 'badge ' + (statusBadges[inv.status] || '');
      document.getElementById('detail-type').textContent = inv.type;
      document.getElementById('detail-category').textContent = catNames[inv.category] || inv.category;
      document.getElementById('detail-code').textContent = inv.invoiceCode || '—';
      document.getElementById('detail-number').textContent = inv.invoiceNumber || '—';
      document.getElementById('detail-seller').textContent = inv.seller;
      document.getElementById('detail-buyer').textContent = inv.buyer;
      document.getElementById('detail-notes').textContent = inv.notes || '—';
      document.getElementById('detail-amount').textContent = '¥' + inv.amount.toLocaleString('zh-CN', {minimumFractionDigits:2});
      document.getElementById('detail-taxrate').textContent = inv.taxRate + '%';
      document.getElementById('detail-tax').textContent = '¥' + inv.taxAmount.toLocaleString('zh-CN', {minimumFractionDigits:2});
      document.getElementById('detail-total').textContent = '¥' + inv.totalAmount.toLocaleString('zh-CN', {minimumFractionDigits:2});

      // 按钮状态
      document.getElementById('btn-approve').style.display = inv.status === 'pending' ? '' : 'none';
      document.getElementById('btn-reject').style.display = inv.status === 'pending' ? '' : 'none';
      document.getElementById('btn-pending').style.display = inv.status !== 'pending' ? '' : 'none';
    }

    function changeStatus(newStatus) {
      if (!currentInvoice) return;
      fetch('/api/invoices/' + currentInvoice.id + '/status', {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ status: newStatus })
      })
        .then(function(r) { return r.json(); })
        .then(function(inv) {
          currentInvoice = inv;
          renderDetail();
          var msgs = { reimbursed: '已标记为"已报销"', rejected: '已标记为"已退回"', pending: '已重置为"待报销"' };
          alert('状态更新：' + (msgs[newStatus] || newStatus));
        })
        .catch(function() {
          alert('状态更新失败，请确认后端服务已启动');
        });
    }
  </script>
</body>
</html>
