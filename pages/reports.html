<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>统计报表 — 发票管家</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <style>
    .app-shell {
      max-width: 1120px; margin: 0 auto;
      padding: var(--space-lg) var(--space-lg) var(--space-3xl);
      display: flex; flex-direction: column; gap: var(--space-lg);
    }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: var(--space-md); border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: var(--space-md);
    }
    .top-bar .breadcrumb { display: flex; align-items: center; gap: var(--space-sm); font-size: 0.8125rem; color: var(--muted); }
    .top-bar .breadcrumb a { color: var(--accent-text); text-decoration: none; }
    .top-bar .breadcrumb a:hover { text-decoration: underline; }

    .chart-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md);
    }
    .chart-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: var(--space-lg);
    }
    .chart-card h3 { margin-bottom: var(--space-md); }
    .chart-card canvas { width: 100%; height: 280px; display: block; }
    .chart-card.full { grid-column: 1 / -1; }

    .stat-summary {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-md);
    }
    .stat-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: var(--space-lg);
      text-align: center; display: flex; flex-direction: column; gap: 4px;
    }
    .stat-item .si-value { font-family: var(--font-mono); font-size: 1.5rem; font-weight: 600; }
    .stat-item .si-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }

    @media (max-width: 768px) {
      .chart-grid { grid-template-columns: 1fr; }
      .stat-summary { grid-template-columns: repeat(2, 1fr); }
      .app-shell { padding: var(--space-md); gap: var(--space-md); }
    }
  </style>
</head>
<body>
  <div class="app-shell animate-in">

    <!-- 顶栏 -->
    <div class="top-bar">
      <div class="breadcrumb">
        <a href="../index.html">发票管家</a>
        <span style="color:var(--border);">›</span>
        <span>统计报表</span>
      </div>
      <div class="flex gap-sm items-center">
        <span class="text-xs text-muted">统计周期</span>
        <select class="input select" style="max-width:140px;" id="period-select" onchange="alert('演示数据基于 2026年1-6月')">
          <option>2026年1-6月</option>
          <option>2026年</option>
          <option>2025年</option>
        </select>
        <button class="btn btn-sm">导出报表</button>
      </div>
    </div>

    <h1>统计报表</h1>

    <!-- 汇总 -->
    <section class="stat-summary" data-od-id="report-summary">
      <div class="stat-item">
        <div class="si-label">发票总数</div>
        <div class="si-value">0</div>
      </div>
      <div class="stat-item">
        <div class="si-label">含税总额</div>
        <div class="si-value">¥0</div>
      </div>
      <div class="stat-item">
        <div class="si-label">月均发票</div>
        <div class="si-value">—</div>
      </div>
      <div class="stat-item">
        <div class="si-label">月均金额</div>
        <div class="si-value">—</div>
      </div>
    </section>

    <!-- 图表 -->
    <section class="chart-grid" data-od-id="report-charts">
      <div class="chart-card full">
        <h3>月度趋势 — 发票数量与金额</h3>
        <canvas id="chart-trend"></canvas>
      </div>
      <div class="chart-card">
        <h3>类别金额占比</h3>
        <canvas id="chart-cat-pie"></canvas>
      </div>
      <div class="chart-card">
        <h3>状态分布</h3>
        <canvas id="chart-status"></canvas>
      </div>
      <div class="chart-card full">
        <h3>各类别月度支出热力</h3>
        <canvas id="chart-heat"></canvas>
      </div>
    </section>

    <!-- 数据表格 -->
    <section class="card" data-od-id="report-table">
      <h3 style="margin-bottom: var(--space-md);">月度明细</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>月份</th><th>发票数</th><th>不含税金额</th><th>税额</th><th>含税总额</th><th>报销率</th></tr>
          </thead>
          <tbody>
            <tr><td colspan="6" style="text-align:center;padding:var(--space-2xl);color:var(--muted);">开始录入发票后，数据将在此展示</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    // 所有图表 — 空状态
    ['chart-trend','chart-cat-pie','chart-status','chart-heat'].forEach(function(id) {
      var canvas = document.getElementById(id);
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var dpr = window.devicePixelRatio || 1;
      canvas.width = 400 * dpr; canvas.height = 200 * dpr;
      canvas.style.width = '100%'; canvas.style.height = '200px';
      ctx.scale(dpr, dpr);
      ctx.fillStyle = '#6e6d75';
      ctx.font = '14px -apple-system, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('录入发票后，统计图表将在此展示', 200, 100);
    });
  </script>
</body>
</html>
