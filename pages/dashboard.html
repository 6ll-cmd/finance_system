<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>数据看板 — 发票管家</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <style>
    .app-shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: var(--space-lg) var(--space-lg) var(--space-3xl);
      display: flex; flex-direction: column; gap: var(--space-lg);
    }
    /* 顶栏 */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: var(--space-md);
    }
    .top-bar .breadcrumb {
      display: flex; align-items: center; gap: var(--space-sm);
      font-size: 0.8125rem; color: var(--muted);
    }
    .top-bar .breadcrumb a { color: var(--accent-text); text-decoration: none; }
    .top-bar .breadcrumb a:hover { text-decoration: underline; }
    .top-bar .breadcrumb .sep { color: var(--border); }

    /* 统计卡片行 */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-md);
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: var(--space-lg);
      display: flex; flex-direction: column; gap: 4px;
    }
    .stat-card .sc-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .stat-card .sc-value { font-family: var(--font-mono); font-size: 1.625rem; font-weight: 600; letter-spacing: -0.01em; }
    .stat-card .sc-sub { font-size: 0.75rem; color: var(--muted); }
    .stat-card .sc-delta { font-size: 0.75rem; font-weight: 510; }
    .stat-card .sc-delta.up { color: var(--success); }
    .stat-card .sc-delta.down { color: var(--danger); }

    /* 图表区域 */
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
    }
    .chart-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: var(--space-lg);
    }
    .chart-card h3 { margin-bottom: var(--space-md); }
    .chart-card canvas { width: 100%; height: 260px; display: block; }

    /* 底部表格 */
    .summary-table { margin-top: var(--space-sm); }

    @media (max-width: 768px) {
      .stat-row { grid-template-columns: repeat(2, 1fr); }
      .chart-grid { grid-template-columns: 1fr; }
      .app-shell { padding: var(--space-md); gap: var(--space-md); }
    }
  </style>
</head>
<body>
  <div class="app-shell animate-in">

    <!-- 顶栏导航 -->
    <div class="top-bar">
      <div class="breadcrumb">
        <a href="../index.html">发票管家</a>
        <span class="sep">›</span>
        <span>数据看板</span>
      </div>
      <div class="flex gap-sm items-center">
        <span class="text-xs text-muted">数据更新于</span>
        <span class="badge badge-info">2026年6月</span>
      </div>
    </div>

    <h1>数据看板</h1>

    <!-- 统计卡片 -->
    <section class="stat-row" data-od-id="dashboard-stats">
      <div class="stat-card">
        <div class="sc-label">本月发票数</div>
        <div class="sc-value" id="ds-month">—</div>
        <div class="sc-sub" id="ds-month-sub">—</div>
      </div>
      <div class="stat-card">
        <div class="sc-label">本月金额</div>
        <div class="sc-value" id="ds-amount">¥0</div>
        <div class="sc-sub">含税总额</div>
      </div>
      <div class="stat-card">
        <div class="sc-label">待报销</div>
        <div class="sc-value" id="ds-pending">0</div>
        <div class="sc-sub" id="ds-pending-sub">—</div>
      </div>
      <div class="stat-card">
        <div class="sc-label">报销率</div>
        <div class="sc-value" id="ds-rate">—</div>
        <div class="sc-delta">—</div>
      </div>
    </section>

    <!-- 图表区 -->
    <section class="chart-grid" data-od-id="dashboard-charts">
      <div class="chart-card">
        <h3>月度趋势（近6个月）</h3>
        <canvas id="chart-monthly"></canvas>
      </div>
      <div class="chart-card">
        <h3>类别分布（本月）</h3>
        <canvas id="chart-category"></canvas>
      </div>
    </section>

    <!-- 分类汇总表 -->
    <section class="card summary-table" data-od-id="category-summary">
      <h3 style="margin-bottom: var(--space-md);">分类汇总 — 2026年6月</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>类别</th><th>发票数</th><th>金额（元）</th><th>占比</th><th>状态</th></tr>
          </thead>
          <tbody id="category-tbody">
            <tr><td colspan="5" style="text-align:center;padding:var(--space-2xl);color:var(--muted);">录入发票后，分类数据将在此展示</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    // 月度趋势图 — 空状态
    (function() {
      var canvas = document.getElementById('chart-monthly');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var dpr = window.devicePixelRatio || 1;
      var W = 400, H = 200;
      canvas.width = W * dpr; canvas.height = H * dpr;
      canvas.style.width = '100%'; canvas.style.height = '200px';
      ctx.scale(dpr, dpr);
      ctx.fillStyle = '#6e6d75';
      ctx.font = '14px -apple-system, system-ui, sans-serif';
      ctx.textAlign = 'center';
      // 从 API 加载数据
      fetch('/api/reports').then(function(r){return r.json()}).then(function(d){
        if (!d.monthly || !d.monthly.length) { ctx.fillText('录入发票后，月度趋势将在此展示', W/2, H/2); return; }
        var months = d.monthly.slice(-6), maxVal = Math.max.apply(null, months.map(function(m){return m.totalAmount})) * 1.2;
        if (maxVal <= 0) { ctx.fillText('录入发票后，月度趋势将在此展示', W/2, H/2); return; }
        var bars = months.length, bw = W / bars * 0.5, gap = W / bars;
        ctx.font = '10px ui-monospace';
        months.forEach(function(m, i){
          var x = gap * i + (gap-bw)/2, h = (m.totalAmount / maxVal) * (H-40);
          ctx.fillStyle = '#5b5fc7'; ctx.globalAlpha = 0.7;
          ctx.beginPath(); ctx.roundRect(x, H-40-h, bw, h, [4,4,0,0]); ctx.fill();
          ctx.globalAlpha = 1; ctx.fillStyle = '#1a1a1e';
          ctx.fillText('¥'+(m.totalAmount/1000).toFixed(0)+'k', x+bw/2, H-44-h);
          ctx.fillStyle = '#6e6d75'; ctx.font = '10px -apple-system'; ctx.fillText(m.month.substring(5), x+bw/2, H-10);
        });
      }).catch(function(){ ctx.fillText('录入发票后，月度趋势将在此展示', W/2, H/2); });
    })();

    // 类别分布图 — 空状态
    (function() {
      var canvas = document.getElementById('chart-category');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var dpr = window.devicePixelRatio || 1;
      var W = 400, H = 200;
      canvas.width = W * dpr; canvas.height = H * dpr;
      canvas.style.width = '100%'; canvas.style.height = '200px';
      ctx.scale(dpr, dpr);
      ctx.fillStyle = '#6e6d75'; ctx.font = '14px -apple-system, system-ui, sans-serif'; ctx.textAlign = 'center';
      fetch('/api/reports').then(function(r){return r.json()}).then(function(d){
        if (!d.categories || !d.categories.length) { ctx.fillText('录入发票后，类别分布将在此展示', W/2, H/2); return; }
        var cats = d.categories.filter(function(c){return c.count > 0});
        if (!cats.length) { ctx.fillText('录入发票后，类别分布将在此展示', W/2, H/2); return; }
        var total = cats.reduce(function(s,c){return s+c.totalAmount},0), angle = -Math.PI/2;
        var cx = 120, cy = H/2, r = Math.min(cx-10, cy-20);
        var colors = ['#5b5fc7','#8888dd','#aab0e8','#7db89a','#e0c87a','#e8b89a','#c8c8f0','#ddd'];
        cats.forEach(function(c, i){
          var slice = (c.totalAmount/total)*Math.PI*2;
          ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,angle,angle+slice); ctx.closePath();
          ctx.fillStyle = colors[i%colors.length]; ctx.fill();
          var mid = angle+slice/2;
          ctx.fillStyle = '#1a1a1e'; ctx.font = '10px -apple-system'; ctx.textAlign = mid>Math.PI/2||mid<-Math.PI/2?'right':'left';
          ctx.fillText(c.name+' '+(c.totalAmount/total*100).toFixed(0)+'%', cx+Math.cos(mid)*(r+30), cy+Math.sin(mid)*(r+10)+4);
          angle += slice;
        });
      }).catch(function(){ ctx.fillText('录入发票后，类别分布将在此展示', W/2, H/2); });
    })();

    // 加载统计数据
    fetch('/api/stats').then(function(r){return r.json()}).then(function(s){
      document.getElementById('ds-month').textContent = s.thisMonth;
      document.getElementById('ds-month-sub').textContent = s.thisMonth > 0 ? '较上月' : '开始录入后显示';
      document.getElementById('ds-amount').textContent = '¥' + s.thisMonthAmount.toLocaleString('zh-CN');
      document.getElementById('ds-pending').textContent = s.pendingReimburse + ' 笔';
      document.getElementById('ds-pending-sub').textContent = '¥' + s.pendingAmount.toLocaleString('zh-CN', {minimumFractionDigits:2});
      var rate = s.totalInvoices > 0 ? (s.reimbursed / s.totalInvoices * 100).toFixed(1) + '%' : '—';
      document.getElementById('ds-rate').textContent = rate;
    }).catch(function(){});
  </script>
</body>
</html>
