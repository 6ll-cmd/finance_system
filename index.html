<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>发票管家</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; }

    .sidebar {
      width: 240px; min-width: 240px; height: 100vh;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0;
    }
    .sidebar-logo {
      padding: var(--space-lg) var(--space-lg) var(--space-md);
      display: flex; align-items: center; gap: var(--space-md);
      border-bottom: 1px solid var(--border-light);
    }
    .sidebar-logo .logo-icon {
      width: 38px; height: 38px; background: var(--accent);
      border-radius: var(--radius-md); display: grid; place-items: center;
      color: var(--on-accent); font-size: 1.1rem; flex-shrink: 0;
      user-select: none; -webkit-user-select: none;
    }
    .sidebar-logo h1 { font-size: 1.125rem; white-space: nowrap; }

    .sidebar-nav { flex: 1; padding: var(--space-sm) 0; }
    .nav-section { margin-bottom: 2px; }
    .nav-section-title {
      padding: var(--space-md) var(--space-lg) var(--space-xs);
      font-size: 0.6875rem; color: var(--muted);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .nav-item {
      display: flex; align-items: center; gap: var(--space-sm);
      padding: 10px var(--space-lg); margin: 1px var(--space-sm);
      border-radius: var(--radius-md); cursor: pointer;
      text-decoration: none; color: var(--fg);
      font-size: 0.875rem; font-weight: 490;
      transition: all var(--duration) var(--ease);
    }
    .nav-item:hover { background: var(--hover); }
    .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 590; }
    .nav-item svg { flex-shrink: 0; opacity: 0.65; }
    .nav-item.active svg { opacity: 1; color: var(--accent); }

    .sidebar-footer {
      padding: var(--space-md) var(--space-lg);
      border-top: 1px solid var(--border-light);
      font-size: 0.75rem; color: var(--muted);
      display: flex; flex-wrap: wrap; gap: var(--space-sm); align-items: center;
    }
    .sidebar-footer a { color: var(--muted); text-decoration: none; white-space: nowrap; }
    .sidebar-footer a:hover { color: var(--accent); }
    .ai-trigger-btn {
      display:flex;align-items:center;gap:6px;cursor:pointer;
      padding:8px 12px;border-radius:var(--radius-md);margin:4px 0;width:100%;
      background:linear-gradient(135deg, var(--accent), #8b5cf6);
      color:#fff;font-size:0.8125rem;font-weight:510;border:none;
      justify-content:center;transition:all var(--duration) var(--ease);
    }
    .ai-trigger-btn:hover { opacity:0.9; transform:scale(1.02); }

    /* iframe 内容区 */
    .content-frame {
      flex: 1; height: 100vh; border: none;
      background: var(--bg);
    }

    @media (max-width: 768px) {
      .sidebar { width: 56px; min-width: 56px; }
      .sidebar .nav-item span, .sidebar .nav-section-title,
      .sidebar .sidebar-footer a, .sidebar-logo div { display: none; }
      .sidebar .nav-item { justify-content: center; padding: 10px; }
      .sidebar-footer { justify-content: center; }
    }
  </style>
</head>
<body>

  <aside class="sidebar" data-od-id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/><line x1="8" y1="3" x2="8" y2="21"/><line x1="8" y1="8" x2="20" y2="8"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="8" y1="16" x2="16" y2="16"/>
        </svg>
      </div>
      <div><h1>发票管家</h1></div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">主菜单</div>
        <a href="pages/home.html" target="content-frame" class="nav-item active" onclick="setActive(this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>首页概览</span>
        </a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">发票管理</div>
        <a href="pages/invoice-list.html" target="content-frame" class="nav-item" onclick="setActive(this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>发票列表</span>
        </a>
        <a href="pages/invoice-add.html" target="content-frame" class="nav-item" onclick="setActive(this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          <span>发票录入</span>
        </a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">凭证管理</div>
        <a href="pages/voucher-list.html" target="content-frame" class="nav-item" onclick="setActive(this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="8" y1="3" x2="8" y2="21"/><line x1="8" y1="8" x2="20" y2="8"/><line x1="8" y1="15" x2="14" y2="15"/></svg>
          <span>凭证列表</span>
        </a>
        <a href="pages/voucher-add.html" target="content-frame" class="nav-item" onclick="setActive(this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          <span>新增凭证</span>
        </a>
        <a href="pages/accounts.html" target="content-frame" class="nav-item" onclick="setActive(this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span>科目表</span>
        </a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">分析</div>
        <a href="pages/dashboard.html" target="content-frame" class="nav-item" onclick="setActive(this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
          <span>数据看板</span>
        </a>
        <a href="pages/reports.html" target="content-frame" class="nav-item" onclick="setActive(this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>统计报表</span>
        </a>
        <a href="pages/settings.html" target="content-frame" class="nav-item" onclick="setActive(this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <span>系统设置</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <span id="current-user" style="font-weight:510;color:var(--accent);font-size:0.75rem;"></span>
      <button class="ai-trigger-btn" onclick="AIPanel.open()">🤖 AI 助手</button>
      <div style="display:flex;gap:var(--space-sm);align-items:center;">
        <a href="#" onclick="toggleTheme();return false;">🌓</a>
        <a href="#" onclick="shutdown();return false;" style="color:var(--danger);">⏻ 退出</a>
      </div>
    </div>
  </aside>

  <iframe name="content-frame" class="content-frame" src="pages/home.html"></iframe>

  <script src="js/auth.js"></script>
  <script src="js/ai-assistant.js"></script>
  <script>
    // 高亮当前菜单项
    function setActive(el) {
      document.querySelectorAll('.nav-item').forEach(function(item) { item.classList.remove('active'); });
      el.classList.add('active');
    }
    // 显示用户名
    var uname = localStorage.getItem('username');
    if (uname) { var el = document.getElementById('current-user'); if (el) el.textContent = uname; }
  </script>
</body>
</html>
