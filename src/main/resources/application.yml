server:
  port: 3456

spring:
  application:
    name: finance-system
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  web:
    resources:
      static-locations: classpath:/static/
  datasource:
    url: jdbc:postgresql://localhost:5432/finance_db?stringtype=unspecified
    username: finance_user
    password: ${DB_PASSWORD:finance_pass}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  type-handlers-package: com.symbiosis.finance.config
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-256-bit-minimum}
  access-token-expiration: 900000          # 15 分钟（毫秒）
  refresh-token-expiration: 604800000      # 7 天（毫秒）

ai:
  provider: ${AI_PROVIDER:openai}          # openai | anthropic
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:gpt-4o}
  base-url: ${AI_BASE_URL:https://api.openai.com/v1}
  max-tokens: 800

logging:
  level:
    com.symbiosis.finance: DEBUG
